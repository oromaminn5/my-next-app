services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: node_modules
        target: /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    stdin_open: true
    tty: true

volumes:
  node_modules:
